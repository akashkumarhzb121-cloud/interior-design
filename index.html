<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ── Primary Meta ── -->
    <title>Modplint Interiors | Luxury Interior Design Studio Mumbai</title>
    <meta name="description" content="Modplint Interiors — Mumbai's premier luxury interior design studio. Residential & commercial interior design, renovation, and space planning. Book your consultation today." />
    <meta name="keywords" content="interior design Mumbai, luxury interior design, home interior design Mumbai, commercial interior design, residential interior design, interior decorator Mumbai, Modplint Interiors, interior design services, modular kitchen, home renovation Mumbai" />
    <meta name="author" content="Modplint Interiors" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#D4AF37" />

    <!-- ── Canonical ── -->
    <link rel="canonical" href="https://www.modplintinteriors.com/" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.modplintinteriors.com/" />
    <meta property="og:title"       content="Modplint Interiors | Luxury Interior Design Studio Mumbai" />
    <meta property="og:description" content="Transform your space with Mumbai's premier luxury interior design studio. Office, residential & commercial designs. Book your consultation today." />
    <meta property="og:image"       content="https://www.modplintinteriors.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Modplint Interiors — Luxury Interior Design Mumbai" />
    <meta property="og:site_name"   content="Modplint Interiors" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://www.modplintinteriors.com/" />
    <meta name="twitter:title"       content="Modplint Interiors | Luxury Interior Design Studio Mumbai" />
    <meta name="twitter:description" content="Transform your space with Mumbai's premier luxury interior design studio. Book your consultation today." />
    <meta name="twitter:image"       content="https://www.modplintinteriors.com/og-image.jpg" />

    <!-- ── Structured Data — LocalBusiness ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "InteriorDesigner",
      "name": "Modplint Interiors",
      "url": "https://www.modplintinteriors.com",
      "logo": "https://www.modplintinteriors.com/icon.svg",
      "image": "https://www.modplintinteriors.com/og-image.jpg",
      "description": "Mumbai's premier luxury interior design studio offering office, residential and commercial interior design, renovation, and space planning services.",
      "telephone": "+91-8741072815",
      "email": "modplintinteriors@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Oshiwara",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "postalCode": "400102",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "19.0760",
        "longitude": "72.8777"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "10:00",
          "closes": "18:00"
        }
      ],
      "priceRange": "₹₹₹",
      "servesCuisine": null,
      "sameAs": [
        "https://www.instagram.com/modplintinteriors",
        "https://www.facebook.com/modplintinteriors"
      ],
      "areaServed": {
        "@type": "City",
        "name": "Mumbai"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Interior Design Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Residential Interior Design" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Commercial Interior Design" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Home Renovation" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Space Planning & Consultation" }}
        ]
      }
    }
    </script>

    <!-- ── Structured Data — WebSite with Sitelinks Search ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://www.modplintinteriors.com",
      "name": "Modplint Interiors",
      "description": "Luxury Interior Design Studio in Mumbai",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.modplintinteriors.com/projects?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Structured Data — BreadcrumbList for all pages ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",         "item": "https://www.modplintinteriors.com/" },
        { "@type": "ListItem", "position": 2, "name": "Projects",     "item": "https://www.modplintinteriors.com/projects" },
        { "@type": "ListItem", "position": 3, "name": "Services",     "item": "https://www.modplintinteriors.com/services" },
        { "@type": "ListItem", "position": 4, "name": "About",        "item": "https://www.modplintinteriors.com/about" },
        { "@type": "ListItem", "position": 5, "name": "Testimonials", "item": "https://www.modplintinteriors.com/testimonials" },
        { "@type": "ListItem", "position": 6, "name": "Contact",      "item": "https://www.modplintinteriors.com/contact" },
        { "@type": "ListItem", "position": 7, "name": "Book a Consultation", "item": "https://www.modplintinteriors.com/booking" }
      ]
    }
    </script>

    <!-- ── Favicons ── -->
    <link rel="icon"             type="image/svg+xml" href="/icon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/icon-light-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180"     href="/apple-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Razorpay ── -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
